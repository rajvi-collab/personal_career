# Portal Scanner Configuration — Rajavi Gontiya
# Customized for: New Grad Software Engineer (Backend / Data / Cloud / AI-ML)
# Location: American Fork, Utah | Open to Remote & U.S. On-site
# Visa: Requires sponsorship — prioritize E-Verify employers
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Backend / Software Engineering --
    - "Software Engineer"
    - "Software Developer"
    - "Backend Engineer"
    - "Backend Developer"
    - "Python Developer"
    - "Python Engineer"
    - "API Engineer"
    - "Application Developer"
    - "Full Stack"
    - "Fullstack"
    # -- Data Engineering --
    - "Data Engineer"
    - "ETL"
    - "Data Pipeline"
    - "Data Platform"
    - "Analytics Engineer"
    - "Database Engineer"
    # -- Cloud / DevOps / Platform --
    - "Cloud Engineer"
    - "DevOps Engineer"
    - "Platform Engineer"
    - "Site Reliability"
    - "SRE"
    - "Infrastructure Engineer"
    - "Systems Engineer"
    # -- AI / ML --
    - "AI Engineer"
    - "ML Engineer"
    - "Machine Learning"
    - "AI/ML"
    - "NLP"
    - "LLM"
    - "GenAI"
    - "MLOps"
    # -- General catch-all --
    - "New Grad"
    - "Entry Level"
    - "Associate Engineer"
    - "Junior Engineer"
    - "Solutions Engineer"
    - "Integration Engineer"
    - "Microservices"
  negative:
    # Roles outside your stack
    - "iOS"
    - "Android"
    - "Swift"
    - "Kotlin"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - ".NET"
    - "Rust"  # not in your stack currently
    - "Go Engineer"  # not primary
    # Too senior for new grad
    - "Staff"
    - "Principal"
    - "Distinguished"
    - "Director"
    - "VP "
    - "Head of"
    - "Manager"  # engineering manager, not IC
  seniority_boost:
    # These are nice-to-have, not required
    - "New Grad"
    - "Entry Level"
    - "Junior"
    - "Associate"
    - "Early Career"
    - "University"

# -- Search queries --
# Each query triggers a WebSearch. Targeted at U.S. job boards.

search_queries:

  # -- New Grad Aggregators --
  - name: SimplifyJobs — New Grad SWE
    query: 'site:simplify.jobs "Software Engineer" "New Grad" OR "Entry Level" 2025 OR 2026'
    enabled: true

  - name: GitHub New Grad Repo
    query: 'site:github.com/SimplifyJobs/New-Grad-Positions "Software Engineer" OR "Data Engineer" OR "Backend"'
    enabled: true

  - name: Levels.fyi — New Grad
    query: 'site:levels.fyi/jobs "New Grad" OR "Entry Level" "Software Engineer" OR "Data Engineer"'
    enabled: true

  # -- Greenhouse (heavily used by tech companies) --
  - name: Greenhouse — Backend New Grad
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Software Engineer" OR "Backend" "New Grad" OR "Entry Level"'
    enabled: true

  - name: Greenhouse — Data Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Data Engineer" OR "ETL" OR "Data Pipeline" Python'
    enabled: true

  - name: Greenhouse — Cloud DevOps
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Cloud Engineer" OR "DevOps" OR "Platform Engineer" AWS OR Azure Docker'
    enabled: true

  - name: Greenhouse — AI ML Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "ML Engineer" OR "Machine Learning" Python'
    enabled: true

  # -- Ashby --
  - name: Ashby — Backend SWE
    query: 'site:jobs.ashbyhq.com "Software Engineer" OR "Backend Engineer" Python OR Django remote'
    enabled: true

  - name: Ashby — Data Engineer
    query: 'site:jobs.ashbyhq.com "Data Engineer" OR "Data Platform" OR "ETL" Python OR PySpark'
    enabled: true

  - name: Ashby — Cloud DevOps
    query: 'site:jobs.ashbyhq.com "Cloud Engineer" OR "DevOps" OR "SRE" AWS OR Azure OR Kubernetes'
    enabled: true

  # -- Lever --
  - name: Lever — Backend SWE
    query: 'site:jobs.lever.co "Software Engineer" OR "Backend" Python OR Django "New Grad" OR "Entry Level"'
    enabled: true

  - name: Lever — Data Engineer
    query: 'site:jobs.lever.co "Data Engineer" OR "ETL" OR "Pipeline" Python OR PySpark'
    enabled: true

  # -- Workday (used by large enterprises) --
  - name: Workday — New Grad SWE
    query: 'site:myworkdayjobs.com "Software Engineer" "New Grad" OR "Entry Level" OR "University"'
    enabled: true

  # -- LinkedIn (broad catch) --
  - name: LinkedIn — Backend Python Utah
    query: 'site:linkedin.com/jobs "Software Engineer" OR "Backend" Python Utah OR remote "Entry Level"'
    enabled: true

  - name: LinkedIn — Data Engineer Remote
    query: 'site:linkedin.com/jobs "Data Engineer" Python OR PySpark remote "Entry Level" OR "New Grad"'
    enabled: true

  # -- Utah / Silicon Slopes specific --
  - name: Silicon Slopes — SWE Utah
    query: '"Software Engineer" OR "Backend" OR "Data Engineer" Utah OR Lehi OR Provo OR "Salt Lake City" OR "American Fork" "Entry Level" OR "New Grad"'
    enabled: true

  - name: Utah Tech Jobs
    query: 'site:linkedin.com/jobs OR site:indeed.com "Software Engineer" OR "Python Developer" Utah 2025 OR 2026'
    enabled: true

  # -- Remote-friendly U.S. boards --
  - name: Remotive — Backend Data Cloud
    query: 'site:remotive.com "Software Engineer" OR "Data Engineer" OR "Cloud Engineer" OR "Backend" Python remote'
    enabled: true

  - name: WeWorkRemotely — SWE Data
    query: 'site:weworkremotely.com "Software Engineer" OR "Data Engineer" OR "Backend" OR "Python" OR "DevOps"'
    enabled: true

  - name: RemoteOK — SWE Python
    query: 'site:remoteok.com "Software Engineer" OR "Python" OR "Data Engineer" OR "Backend"'
    enabled: true

  # -- YC / Startup boards --
  - name: YC Jobs — Backend Data
    query: 'site:workatastartup.com "Software Engineer" OR "Backend" OR "Data Engineer" Python remote'
    enabled: true

  - name: YC Jobs — New Grad
    query: 'site:workatastartup.com "New Grad" OR "Entry Level" OR "Junior" "Engineer"'
    enabled: true

  - name: HN Who is Hiring — Backend Data
    query: 'site:news.ycombinator.com "Who is hiring" "Python" OR "Backend" OR "Data Engineer" OR "Django" remote'
    enabled: true

  # -- E-Verify focused --
  - name: E-Verify Sponsors — SWE
    query: '"Software Engineer" OR "Data Engineer" "E-Verify" OR "visa sponsorship" Python 2025 OR 2026'
    enabled: true

  - name: MyVisaJobs — SWE Sponsors
    query: 'site:myvisajobs.com "Software Engineer" OR "Data Engineer" OR "Python" H1B 2025'
    enabled: true


